# docker-compose.override.yml
#
# Docker Compose automatically merges this file with docker-compose.yml
# when you run plain `docker-compose up`.
#
# This override reconfigures the `api` service for local development:
#   - Uses Dockerfile.dev (air + full Go toolchain, no prod binary)
#   - Bind-mounts the entire backend source tree into /app
#   - Uses an anonymous volume for /app/tmp so the compiled binary
#     lives inside the container (not on the host filesystem)
#
# The `postgres` service from docker-compose.yml is inherited unchanged.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    # No restart in dev — let it crash and show logs clearly
    restart: "no"
    volumes:
      # Bind-mount the entire backend directory for live source reload
      - .:/app
      # Keep the compiled tmp binary inside the container (not synced to host)
      - /app/tmp
      # Keep the downloaded Go module cache inside the container for speed
      - go_module_cache:/go/pkg/mod
    environment:
      # Useful for local dev — makes Go rebuild faster with race detector off
      CGO_ENABLED: "0"
      GOFLAGS: ""

volumes:
  go_module_cache:
