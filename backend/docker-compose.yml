services:
  postgres:
    image: postgres:16-alpine
    container_name: oil_change_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: oil_change_api
    restart: no
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SERVER_PORT}:8080"
    volumes:
      - .:/app
      - /app/tmp
      - go_module_cache:/go/pkg/mod
    environment:
      SERVER_PORT: ${SERVER_PORT}
      DB_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_EXPIRY_MINUTES: ${ACCESS_TOKEN_EXPIRY_MINUTES}
      REFRESH_TOKEN_EXPIRY_DAYS: ${REFRESH_TOKEN_EXPIRY_DAYS}
      CGO_ENABLED: "0"
      GOFLAGS: ""
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}

volumes:
  postgres_data:
  go_module_cache:
