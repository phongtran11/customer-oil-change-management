name: Build & Deploy — Backend

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Published as: ghcr.io/<owner>/<repo>/backend:latest
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  # ── Job 1: Build & push backend image to GHCR ─────────────────────────────
  build-and-push:
    name: Build & Push backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # needed to push to ghcr.io

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to VPS via SSH ──────────────────────────────────────────
  deploy:
    name: Deploy backend to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 26266
          script: |
            set -e

            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd ${{ secrets.VPS_APP_DIR }}
            docker compose -f docker-compose.yml pull oil-change-api
            docker compose -f docker-compose.yml up -d --no-build oil-change-api
            docker image prune -f
